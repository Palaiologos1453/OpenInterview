      - "能描述连接、解析、预处理、优化、执行和存储引擎交互流程。"
      - "能说明优化器基于成本、选择性、统计信息做执行计划选择。"
      - "能提出 ANALYZE TABLE、索引调整、SQL 改写和执行计划验证。"
    source: "JavaGuide"
    source_path: "docs/database/mysql/how-sql-executed-in-mysql.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: mysql-time-storage-design
