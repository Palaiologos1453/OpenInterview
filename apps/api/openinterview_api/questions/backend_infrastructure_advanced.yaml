questions:
  - id: mysql-log-binlog-redo-undo
    directions: ["backend"]
    difficulty: bigtech
    topic: mysql
    type: fundamentals
    tags: ["MySQL", "Log", "Transaction"]
    prompt: "MySQL 的 redo log、undo log 和 binlog 分别解决什么问题？一次事务提交过程中它们如何协同？"
    followups:
      - "redo log 为什么能保证崩溃恢复？"
      - "binlog 和 redo log 的两阶段提交解决什么一致性问题？"
      - "undo log 除了回滚，还和 MVCC 有什么关系？"
    rubric:
      - "能区分物理重做日志、逻辑归档日志和回滚日志的职责。"
      - "能说明事务提交、刷盘策略、崩溃恢复和主从复制的关系。"
      - "能解释两阶段提交避免 binlog 与 redo log 状态不一致。"
    source: "JavaGuide"
    source_path: "docs/database/mysql/mysql-logs.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: mysql-auto-increment-primary-key
    directions: ["backend"]
    difficulty: campus
    topic: mysql
    type: fundamentals
    tags: ["MySQL", "Primary Key", "InnoDB"]
    prompt: "InnoDB 为什么通常推荐使用自增主键？它和 UUID 主键在索引结构、写入性能和存储成本上有什么差异？"
    followups:
      - "聚簇索引叶子节点保存什么数据？"
      - "随机主键为什么可能导致页分裂？"
      - "分布式系统里如果不能用数据库自增，应该如何补足全局唯一和趋势递增？"
    rubric:
      - "能说明聚簇索引按主键组织数据，自增主键更利于顺序写入。"
      - "能比较 UUID 随机写、索引膨胀、二级索引存储主键的成本。"
      - "能结合分布式 ID、业务可读性和数据迁移做取舍。"
    source: "JavaGuide"
    source_path: "docs/database/mysql/mysql-auto-increment-primary-key-continuous.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: mysql-sql-execution-flow
    directions: ["backend"]
    difficulty: campus
    topic: mysql
    type: fundamentals
    tags: ["MySQL", "SQL", "Optimizer"]
    prompt: "一条 SQL 从客户端发送到 MySQL 返回结果，中间大致经历哪些模块？优化器主要会做哪些选择？"
    followups:
      - "连接器、分析器、优化器、执行器分别负责什么？"
      - "优化器为什么可能不选择你期望的索引？"
      - "统计信息不准确时如何处理？"
