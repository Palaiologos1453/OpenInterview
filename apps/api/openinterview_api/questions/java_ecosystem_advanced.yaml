  - id: java-serialization-compatibility-security
    directions: ["backend"]
    difficulty: campus
    topic: java-basis
    type: scenario
    tags: ["Java", "Serialization", "Security"]
    prompt: "如果服务之间需要传输对象，Java 原生序列化有哪些兼容性、性能和安全风险？你会如何替代或加固？"
