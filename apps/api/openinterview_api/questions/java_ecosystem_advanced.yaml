  - id: java-threadlocal-context-leak
    directions: ["backend"]
    difficulty: bigtech
    topic: java-concurrency
    type: scenario
    tags: ["Java", "ThreadLocal", "Memory Leak"]
    prompt: "Web 服务里用 ThreadLocal 保存用户上下文或 traceId 时，为什么在线程池场景下容易出现数据串用或内存泄漏？"
    followups:
