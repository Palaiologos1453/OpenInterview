      - "能用召回率、排序指标、答案命中和人工样例评估。"
    tags: ["RAG", "Hybrid Search", "Query Rewrite", "Rerank"]

  - id: ai-rag-answer-citation-faithfulness
    directions: ["ai_application"]
    difficulty: bigtech
    topic: rag
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/rag/rag-basis.md"
    source_license: "Apache-2.0"
