questions:
  - id: ai-llm-operation-prefill-decode-latency
    directions: ["ai_application"]
    difficulty: campus
    topic: llm-basics
    type: fundamentals
    source: JavaGuide
    source_path: "docs/ai/llm-basis/llm-operation-mechanism.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "请解释大模型推理里的 prefill 和 decode 阶段。为什么输入很长和输出很长会造成不同类型的延迟？"
    followups:
      - "首 Token 延迟和总生成耗时分别受哪些因素影响？"
      - "如果要优化客服机器人的首响，你会先压缩输入还是限制输出？"
    rubric:
      - "能区分提示词处理、KV Cache 和逐 Token 生成。"
      - "能说明上下文长度、输出长度、并发批处理和模型大小对延迟的影响。"
      - "能提出压缩上下文、流式输出、缓存和模型路由等优化手段。"
    tags: ["LLM 推理", "prefill", "decode", "延迟优化"]

  - id: ai-llm-context-position-noise
    directions: ["ai_application"]
    difficulty: bigtech
    topic: llm-basics
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/llm-basis/llm-operation-mechanism.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "长上下文模型接入后，为什么仍可能出现关键信息找不到或答案变差？你会怎样做上下文质量治理？"
    followups:
      - "上下文里混入重复、过期、低相关内容会带来什么问题？"
      - "如何验证模型真的使用了你放进去的证据？"
    rubric:
      - "能指出长上下文存在位置敏感、噪声干扰和成本上升问题。"
      - "能提出去重、排序、摘要、引用证据和上下文窗口预算策略。"
      - "能用离线评测、引用命中率和错误案例回放验证效果。"
    tags: ["长上下文", "上下文噪声", "证据引用", "质量治理"]

  - id: ai-llm-api-compatibility-adapter
    directions: ["ai_application"]
    difficulty: campus
    topic: llm-api
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/llm-basis/llm-api-engineering.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "公司要同时接入多个 OpenAI-compatible 服务商，你会如何设计统一适配层，处理模型名、错误码、超时和返回格式差异？"
    followups:
      - "不同服务商 streaming chunk 格式不一致怎么办？"
      - "适配层里哪些字段必须进入调用日志？"
    rubric:
      - "能抽象统一请求、响应、错误、用量和流式事件模型。"
      - "能说明 provider 配置、模型能力元数据、超时和重试策略。"
      - "能覆盖日志脱敏、traceId、Token 统计和兼容性测试。"
    tags: ["LLM API", "适配层", "多服务商", "兼容性"]

  - id: ai-llm-api-cancel-timeout-budget
    directions: ["ai_application"]
    difficulty: bigtech
    topic: llm-api
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/llm-basis/llm-api-engineering.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "用户关闭页面或点击停止生成时，后端 LLM 调用层应该如何取消请求，并避免继续消耗 Token 和连接资源？"
    followups:
      - "HTTP streaming、WebSocket 和队列任务的取消边界有什么不同？"
      - "如果服务商不支持取消，你还能做哪些资源保护？"
    rubric:
      - "能覆盖客户端断连感知、Abort、连接关闭和后台任务取消。"
      - "能说明超时预算、最大输出 Token、并发限制和清理回调。"
      - "能用取消率、超时率、长连接数量和成本指标监控效果。"
    tags: ["取消生成", "超时预算", "流式响应", "成本控制"]

  - id: ai-prompt-version-regression
    directions: ["ai_application"]
    difficulty: campus
    topic: prompt-engineering
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/agent/prompt-engineering.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "业务 Prompt 频繁迭代时，你会如何做版本管理、灰度发布和回归测试，避免新 Prompt 修一个问题又引入新问题？"
    followups:
      - "Prompt 版本应该和模型版本、知识库版本怎样关联？"
      - "人工改 Prompt 后如何快速发现线上质量回退？"
    rubric:
      - "能说明 Prompt 模板、变量、示例和输出格式都需要版本化。"
      - "能提出 Golden Set、A/B 实验、灰度和回滚策略。"
      - "能结合质量、延迟、成本和投诉样本做发布门禁。"
    tags: ["Prompt 版本", "回归测试", "灰度发布", "质量回退"]

  - id: ai-prompt-injection-defense
    directions: ["ai_application"]
    difficulty: bigtech
    topic: prompt-engineering
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/agent/prompt-engineering.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "RAG 或 Agent 场景里，用户或文档可能包含 Prompt Injection。你会如何识别和降低越权执行风险？"
    followups:
      - "为什么只在系统 Prompt 里写不要越权并不可靠？"
      - "工具调用前为什么还需要服务端权限校验？"
    rubric:
      - "能区分用户指令、系统策略、检索内容和工具参数的可信等级。"
      - "能提出内容隔离、敏感工具确认、参数白名单和权限校验。"
      - "能通过审计、红队样例和异常工具调用告警验证防护。"
    tags: ["Prompt Injection", "安全", "工具权限", "RAG"]

  - id: ai-structured-output-schema-evolution
    directions: ["ai_application"]
    difficulty: campus
    topic: structured-output
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/llm-basis/structured-output-function-calling.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "模型需要输出简历解析 JSON，但字段会随业务迭代变化。你会如何设计 Schema 演进、兼容和校验？"
    followups:
      - "新增必填字段时，老 Prompt 和老模型调用如何兼容？"
      - "模型输出字段类型不匹配时，服务端应该如何处理？"
    rubric:
      - "能说明 JSON Schema、默认值、版本号和向后兼容策略。"
      - "能区分可修复格式错误、语义错误和必须拒绝的错误。"
      - "能提出重试、修复、人工审核和坏样本回归测试。"
    tags: ["结构化输出", "Schema 演进", "校验", "兼容性"]

  - id: ai-structured-output-tool-argument-validation
    directions: ["ai_application"]
    difficulty: bigtech
    topic: structured-output
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/llm-basis/structured-output-function-calling.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "模型通过 Tool Calling 生成了工具参数。服务端为什么不能直接执行？请设计一层参数校验和风险控制。"
    followups:
      - "哪些参数应该由服务端补全，而不是交给模型决定？"
      - "删除、转账、发通知这类高风险工具如何确认？"
    rubric:
      - "能说明模型输出只是意图，不能替代服务端鉴权和业务校验。"
      - "能覆盖类型校验、枚举白名单、资源归属、幂等和审计。"
      - "能按风险等级设计人工确认、沙箱执行和回滚补偿。"
    tags: ["Tool Calling", "参数校验", "权限", "审计"]

  - id: ai-rag-hybrid-search-query-rewrite
    directions: ["ai_application"]
    difficulty: campus
