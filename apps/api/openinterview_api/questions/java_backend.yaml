questions:
  - id: java-string-immutability
    directions: ["backend"]
    difficulty: campus
    topic: java-basis
    type: fundamentals
    tags: ["Java", "String", "JVM"]
    prompt: "为什么 Java 的 String 设计成不可变对象？请从线程安全、哈希缓存、字符串常量池和安全性几个角度说明。"
    followups:
      - "StringBuilder 和 StringBuffer 的差异是什么？什么时候会选 StringBuffer？"
      - "字符串拼接在循环里为什么不建议直接使用 +？"
      - "String.intern() 适合在什么场景使用，又可能带来什么风险？"
    rubric:
      - "能说明不可变对象天然线程安全，适合作为 Map key 和共享常量。"
      - "能讲清 hash 缓存、常量池复用和安全边界的关系。"
      - "能区分 String、StringBuilder、StringBuffer 的性能和线程安全取舍。"
    source: "JavaGuide"
    source_path: "docs/java/basis/java-basic-questions-02.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: java-equals-hashcode-contract
    directions: ["backend"]
    difficulty: campus
    topic: java-basis
    type: fundamentals
    tags: ["Java", "Object", "HashMap"]
    prompt: "重写 equals() 时为什么通常必须一起重写 hashCode()？请结合 HashMap 查找过程说明。"
    followups:
      - "== 和 equals() 的语义差异是什么？"
      - "如果两个对象 equals() 为 true，但 hashCode() 不同，会发生什么？"
      - "业务对象作为 HashMap key 时还要注意哪些可变字段问题？"
    rubric:
      - "能说清 equals 表示逻辑相等，hashCode 用于哈希桶定位。"
      - "能解释相等对象必须有相同 hashCode，否则集合查找可能失败。"
      - "能指出可变字段参与 hashCode 会导致 key 丢失等问题。"
    source: "JavaGuide"
    source_path: "docs/java/basis/java-basic-questions-02.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: java-exception-boundary
    directions: ["backend"]
    difficulty: campus
    topic: java-basis
    type: scenario
    tags: ["Java", "Exception", "API"]
    prompt: "如果你在后端接口里设计异常处理，会如何区分业务异常、参数异常和系统异常？"
    followups:
      - "Checked Exception 和 Unchecked Exception 的区别是什么？"
      - "为什么不建议把所有异常都 catch 后只返回失败？"
      - "全局异常处理器里应该记录哪些日志字段？"
    rubric:
      - "能区分可预期业务失败、调用方错误和服务端未知错误。"
      - "能说明异常不能吞掉，需要保留上下文、堆栈和 trace 信息。"
      - "能结合 HTTP 状态码、错误码和用户提示做分层设计。"
    source: "JavaGuide"
    source_path: "docs/java/basis/java-basic-questions-03.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: java-generics-erasure
    directions: ["backend"]
    difficulty: campus
    topic: java-basis
    type: fundamentals
    tags: ["Java", "Generics"]
    prompt: "Java 泛型擦除是什么？它为什么会影响运行时类型判断和方法重载？"
    followups:
      - "List<String> 和 List<Integer> 在运行时有什么共同点？"
      - "为什么不能直接创建泛型数组？"
      - "上界通配符和下界通配符分别适合什么读写场景？"
    rubric:
      - "能说明泛型主要在编译期提供类型检查，运行期类型参数会被擦除。"
      - "能举出 instanceof、重载签名、泛型数组等受影响场景。"
      - "能用 PECS 思路解释 extends 和 super 的使用边界。"
    source: "JavaGuide"
    source_path: "docs/java/basis/generics-and-wildcards.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: java-reflection-proxy-framework
    directions: ["backend"]
    difficulty: campus
    topic: java-basis
    type: scenario
    tags: ["Java", "Reflection", "Proxy", "Spring"]
    prompt: "反射和动态代理在后端框架里通常解决什么问题？请结合依赖注入、AOP 或 RPC 举例。"
    followups:
      - "JDK 动态代理和 CGLIB 动态代理有什么区别？"
      - "反射为什么会带来性能和安全风险？"
      - "如果一个类没有接口，Spring AOP 通常会怎么代理？"
    rubric:
      - "能说明反射用于运行时获取类型信息和调用成员。"
      - "能说明动态代理用于增强调用过程，如事务、日志、鉴权、远程调用。"
      - "能区分 JDK 代理基于接口，CGLIB 通常基于子类增强。"
    source: "JavaGuide"
    source_path: "docs/java/basis/java-basic-questions-03.md"
    source_license: "Apache-2.0"
