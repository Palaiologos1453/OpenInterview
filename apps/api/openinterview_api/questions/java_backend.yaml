  - id: java-concurrenthashmap-consistency
    directions: ["backend"]
    difficulty: bigtech
    topic: java-collection
    type: fundamentals
    tags: ["Java", "ConcurrentHashMap", "Concurrency"]
    prompt: "ConcurrentHashMap 如何在并发读写场景下兼顾线程安全和性能？"
    followups:
      - "它和 Hashtable、Collections.synchronizedMap 的主要差异是什么？"
      - "为什么不建议在 ConcurrentHashMap 上再加大粒度外部锁？"
      - "size() 在并发修改时为什么不能当成强一致判断？"
    rubric:
      - "能说明分段或桶级并发控制思想，以及读操作尽量无锁的目标。"
      - "能比较全表锁和细粒度锁的吞吐差异。"
      - "能指出并发容器提供线程安全，但不自动保证复合业务操作原子性。"
    source: "JavaGuide"
    source_path: "docs/java/collection/concurrent-hash-map-source-code.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: java-thread-process-memory
    directions: ["backend"]
    difficulty: campus
    topic: java-concurrency
    type: fundamentals
    tags: ["Java", "Thread", "OS"]
    prompt: "线程和进程的区别是什么？从 JVM 运行时内存角度看，哪些区域是线程私有的，哪些是共享的？"
    followups:
      - "为什么程序计数器需要线程私有？"
      - "虚拟机栈里保存的主要是什么？"
      - "线程共享堆内存会带来什么并发风险？"
    rubric:
      - "能说明进程是资源分配单位，线程是更小的执行调度单位。"
      - "能指出程序计数器、虚拟机栈、本地方法栈线程私有。"
      - "能指出堆和方法区共享，并关联线程安全问题。"
    source: "JavaGuide"
    source_path: "docs/java/concurrent/java-concurrent-questions-01.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: java-threadpool-parameters
    directions: ["backend"]
    difficulty: bigtech
    topic: java-concurrency
    type: scenario
    tags: ["Java", "ThreadPool", "Concurrency"]
    prompt: "线上接口需要异步处理耗时任务时，你会如何设计线程池参数和拒绝策略？"
    followups:
      - "核心线程数、最大线程数、队列长度分别影响什么？"
      - "CPU 密集型和 IO 密集型任务的线程数设置有什么差异？"
      - "为什么不建议直接使用 Executors.newFixedThreadPool？"
    rubric:
      - "能解释核心参数、任务队列、拒绝策略和线程回收的作用。"
      - "能按任务类型、下游容量和 SLA 估算线程数。"
      - "能指出无界队列、过大线程数和缺少监控的风险。"
    source: "JavaGuide"
    source_path: "docs/java/concurrent/java-thread-pool-summary.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: java-lock-synchronized-reentrantlock
    directions: ["backend"]
    difficulty: campus
    topic: java-concurrency
    type: fundamentals
    tags: ["Java", "Lock", "AQS"]
    prompt: "synchronized 和 ReentrantLock 有哪些差异？如果要支持可中断等待和公平锁，你会怎么选？"
    followups:
      - "ReentrantLock 为什么要在 finally 里 unlock？"
