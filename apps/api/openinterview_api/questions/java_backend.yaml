    source_usage: "adapted"

  - id: java-jmm-volatile
    directions: ["backend"]
    difficulty: bigtech
    topic: java-concurrency
    type: fundamentals
    tags: ["Java", "JMM", "volatile"]
    prompt: "volatile 能解决什么并发问题？为什么它不能替代锁完成复合操作的原子性保护？"
    followups:
      - "可见性、有序性和原子性分别是什么意思？"
      - "volatile 写和读之间的 happens-before 关系如何理解？"
      - "i++ 使用 volatile 修饰后是否线程安全？为什么？"
