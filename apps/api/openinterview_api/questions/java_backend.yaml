  - id: java-hashmap-resize
    directions: ["backend"]
    difficulty: campus
    topic: java-collection
    type: fundamentals
    tags: ["Java", "HashMap", "Collection"]
    prompt: "HashMap 的 put 和扩容过程大致是怎样的？为什么负载因子不能设置得过大或过小？"
    followups:
      - "JDK 8 中链表什么时候会转成红黑树？"
      - "HashMap 为什么不是线程安全的？"
      - "初始化容量应该如何根据预估数据量设置？"
    rubric:
      - "能讲清哈希定位、冲突处理、链表或红黑树存储。"
      - "能说明扩容会重新分布元素，成本较高。"
