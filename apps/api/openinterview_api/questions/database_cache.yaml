questions:
  - id: db-mysql-index-bplus-tree
    directions: ["backend"]
    difficulty: campus
    topic: mysql
    type: fundamentals
    tags: ["MySQL", "Index", "B+Tree"]
    prompt: "MySQL InnoDB 为什么常用 B+ 树作为索引结构？它相比哈希索引和 B 树更适合哪些查询？"
    followups:
      - "范围查询为什么适合 B+ 树？"
      - "聚簇索引和二级索引有什么区别？"
      - "回表和覆盖索引分别是什么意思？"
    rubric:
      - "能说明 B+ 树多叉、层高低、叶子节点有序链表等特点。"
      - "能比较哈希索引不适合范围查询和排序。"
      - "能解释聚簇索引、二级索引、回表、覆盖索引的工程影响。"
    source: "JavaGuide"
    source_path: "docs/database/mysql/mysql-questions-01.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: db-mysql-index-invalid
    directions: ["backend"]
    difficulty: campus
    topic: mysql
    type: scenario
    tags: ["MySQL", "Index", "SQL"]
    prompt: "一个查询明明建了索引却走了全表扫描，你会从哪些角度排查索引失效？"
    followups:
      - "隐式类型转换为什么可能导致索引失效？"
      - "最左前缀原则如何影响联合索引设计？"
      - "LIKE、函数计算、范围查询分别有哪些注意点？"
    rubric:
      - "能覆盖函数计算、隐式转换、最左前缀、选择性差等常见原因。"
      - "能使用 EXPLAIN 观察 type、key、rows、Extra 等字段。"
      - "能从 SQL 改写、索引重建、统计信息和数据分布角度给出方案。"
    source: "JavaGuide"
    source_path: "docs/database/mysql/mysql-index-invalidation.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: db-mysql-transaction-isolation
    directions: ["backend"]
    difficulty: campus
    topic: mysql
    type: fundamentals
    tags: ["MySQL", "Transaction", "Isolation"]
    prompt: "MySQL 事务隔离级别有哪些？可重复读如何解决不可重复读，又如何看待幻读问题？"
    followups:
      - "脏读、不可重复读、幻读分别是什么？"
      - "MySQL 默认隔离级别是什么？"
      - "MVCC 和锁在隔离级别里分别发挥什么作用？"
    rubric:
      - "能说明读未提交、读已提交、可重复读、串行化的差异。"
      - "能用具体读写例子区分不可重复读和幻读。"
      - "能提到 MVCC、快照读、当前读和 next-key lock 的作用边界。"
    source: "JavaGuide"
    source_path: "docs/database/mysql/transaction-isolation-level.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"

  - id: db-mysql-mvcc
