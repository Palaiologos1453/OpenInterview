  - id: db-mysql-locks
    directions: ["backend"]
    difficulty: bigtech
    topic: mysql
    type: scenario
    tags: ["MySQL", "Lock", "Transaction"]
    prompt: "如果一个接口偶发超时，排查发现数据库锁等待，你会如何定位是哪类锁导致的？"
