questions:
  - id: ai-llm-token-context-window
    directions: ["ai_application"]
    difficulty: campus
    topic: llm-basics
    type: fundamentals
    source: JavaGuide
    source_path: "docs/ai/llm-basis/llm-operation-mechanism.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "请解释 Token、上下文窗口、Temperature 和 Top P 分别会影响什么。如果线上回答质量不稳定，你会优先调哪些参数？"
    followups:
      - "为什么上下文窗口变大不一定代表效果更好？"
      - "Temperature 调高后，准确性、稳定性和多样性会怎样变化？"
    rubric:
      - "能说明 Token、上下文窗口、采样参数和输出稳定性的关系。"
      - "能指出长上下文的信息位置、噪声和成本问题。"
      - "能结合业务场景说明参数调优和灰度验证方式。"
    tags: ["LLM 基础", "上下文窗口", "采样参数", "质量稳定性"]

  - id: ai-llm-api-streaming-retry
    directions: ["ai_application"]
    difficulty: campus
    topic: llm-api
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/llm-basis/llm-api-engineering.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "你要把一个聊天式 AI 功能接入业务系统，LLM API 调用层需要处理哪些工程问题？请重点讲流式响应、超时重试和限流。"
    followups:
      - "如果用户端已经收到一半流式内容，此时模型调用失败，服务端怎么处理？"
      - "重试策略如何避免把成本和延迟放大？"
    rubric:
      - "能覆盖请求组装、流式响应、超时、重试、限流和降级。"
      - "能说明幂等、取消、部分输出和错误回传策略。"
      - "能用日志、Trace、指标统计验证调用链路稳定性。"
    tags: ["LLM API", "流式响应", "重试限流", "工程稳定性"]

  - id: ai-prompt-engineering-output-control
    directions: ["ai_application"]
    difficulty: campus
    topic: prompt-engineering
    type: fundamentals
    source: JavaGuide
    source_path: "docs/ai/agent/prompt-engineering.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "Prompt Engineering 在工程项目里通常要解决哪些问题？请说明角色、任务、约束、示例和输出格式分别起什么作用。"
    followups:
      - "为什么不能把所有业务规则都堆进一个超长 Prompt？"
      - "如果模型经常漏字段或跑题，你会怎么定位是 Prompt 问题还是模型能力问题？"
    rubric:
      - "能说明 Prompt 的角色、任务、约束、示例和输出格式。"
      - "能指出 Prompt 版本管理、复用、可测试性和注入风险。"
      - "能提出用样例集、回归测试和灰度监控评估 Prompt 改动。"
    tags: ["Prompt 工程", "输出控制", "Prompt 版本", "回归测试"]

  - id: ai-structured-output-function-calling
    directions: ["ai_application"]
    difficulty: campus
    topic: structured-output
    type: fundamentals
    source: JavaGuide
    source_path: "docs/ai/llm-basis/structured-output-function-calling.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "结构化输出为什么不能只靠 Prompt 约束？请比较 JSON Schema、Function Calling、Tool Calling 和服务端校验的职责。"
    followups:
      - "模型返回了不合法 JSON 时，服务端应该直接重试、修复还是拒绝？"
      - "Tool Calling 和 MCP 在工程边界上有什么不同？"
    rubric:
      - "能区分格式约束、工具调用意图和服务端参数校验。"
      - "能说明非法输出、缺字段、越权参数和重试修复策略。"
      - "能结合业务接口设计安全边界和审计记录。"
    tags: ["结构化输出", "Function Calling", "Tool Calling", "参数校验"]

  - id: ai-rag-pipeline-design
    directions: ["ai_application"]
    difficulty: campus
    topic: rag
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/rag/rag-basis.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "请设计一个企业知识库问答 RAG 链路，从文档进入系统到最终回答用户，中间有哪些核心步骤和风险点？"
    followups:
      - "如果用户说回答答非所问，你会从召回、排序、上下文还是生成阶段排查？"
      - "哪些场景不适合直接上 RAG？"
    rubric:
      - "能覆盖文档解析、切分、Embedding、检索、Rerank、上下文组装和生成。"
      - "能说明召回不足、排序错误、上下文污染和幻觉风险。"
      - "能提出离线评测、线上反馈和人工审核闭环。"
    tags: ["RAG", "知识库问答", "检索生成", "质量闭环"]

  - id: ai-rag-document-processing
    directions: ["ai_application"]
    difficulty: campus
    topic: rag-document
    type: fundamentals
    source: JavaGuide
    source_path: "docs/ai/rag/rag-document-processing.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "RAG 文档处理为什么不是简单按固定长度切块？请说明解析、清洗、结构化、Chunking 和元数据的作用。"
    followups:
      - "FAQ、产品手册、代码文档和合同类文档的切分策略有什么不同？"
      - "文档更新后如何避免旧 Chunk 和新 Chunk 混用？"
    rubric:
      - "能说明文档解析、清洗、去重、层级结构和元数据。"
      - "能比较固定长度、语义切分、标题层级切分和滑窗策略。"
      - "能覆盖版本控制、增量更新、回滚和可追溯性。"
    tags: ["RAG", "文档处理", "Chunking", "元数据"]

  - id: ai-rag-vector-store-index
    directions: ["ai_application"]
    difficulty: bigtech
    topic: vector-store
    type: fundamentals
    source: JavaGuide
    source_path: "docs/ai/rag/rag-vector-store.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "向量数据库在 RAG 里解决什么问题？请比较 HNSW、IVFFLAT 这类索引在召回、延迟、内存和更新成本上的取舍。"
    followups:
      - "为什么相似度高不等于答案一定正确？"
      - "如果数据规模从十万条到千万条，索引和分片会怎么调整？"
    rubric:
      - "能说明向量检索、近似最近邻、召回率和延迟的关系。"
      - "能比较索引构建成本、内存占用、增量更新和过滤能力。"
      - "能指出向量召回需要结合关键词、Rerank 和业务过滤。"
    tags: ["向量数据库", "HNSW", "IVFFLAT", "检索优化"]

  - id: ai-rag-evaluation-optimization
    directions: ["ai_application"]
    difficulty: bigtech
    topic: rag-evaluation
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/rag/rag-optimization.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "一个 RAG 系统上线后用户反馈命中率低、答案不稳定，你会怎样建立评测集并定位优化方向？"
    followups:
      - "怎么分别评估检索召回、Rerank、答案忠实度和最终可用性？"
      - "Hybrid Search、Query Rewrite、Rerank 和上下文压缩分别适合解决什么问题？"
    rubric:
      - "能提出 Golden Set、人工标注、线上反馈和 Trace 回放。"
      - "能区分召回率、排序质量、忠实度、答案完整性和延迟成本。"
      - "能给出针对检索、排序、上下文和生成阶段的优化策略。"
    tags: ["RAG 评测", "检索优化", "Rerank", "Trace 回放"]

  - id: ai-agent-tool-calling-permission
    directions: ["ai_application"]
    difficulty: bigtech
    topic: agent
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/agent/agent-basis.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "请解释 Agent Loop 的基本过程，并设计一个能调用外部 API 的 Agent。你会怎样控制工具权限和失败重试？"
    followups:
      - "Agent 和固定 Workflow 的边界在哪里？什么时候不该用 Agent？"
      - "如果工具返回错误数据，Agent 继续推理可能带来什么风险？"
    rubric:
      - "能讲清观察、规划、行动、工具返回和停止条件。"
      - "能说明工具注册、参数校验、权限最小化、人工确认和审计。"
      - "能覆盖循环上限、失败重试、降级和成本控制。"
    tags: ["Agent", "Tool Calling", "权限控制", "失败重试"]

  - id: ai-agent-memory-context
    directions: ["ai_application"]
    difficulty: bigtech
    topic: agent-memory
    type: fundamentals
    source: JavaGuide
    source_path: "docs/ai/agent/agent-memory.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "Agent 的短期记忆、长期记忆和 RAG 有什么区别？如果要做一个客服 Agent，你会怎样设计记忆写入和遗忘机制？"
    followups:
      - "哪些用户信息不能直接写入长期记忆？"
      - "记忆检索错了会怎样影响模型回答？怎么评估？"
    rubric:
      - "能区分会话上下文、长期用户画像、知识库检索和结构化状态。"
      - "能说明记忆写入触发、去重、合成、过期、删除和隐私边界。"
      - "能提出记忆命中率、错误注入、人工审核和用户可控机制。"
    tags: ["Agent Memory", "Context Engineering", "隐私", "长期记忆"]

  - id: ai-context-engineering-token-budget
    directions: ["ai_application"]
    difficulty: campus
    topic: context-engineering
    type: fundamentals
    source: JavaGuide
    source_path: "docs/ai/agent/context-engineering.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "Context Engineering 和 Prompt Engineering 有什么区别？在一个长任务 Agent 里，你会怎样管理上下文和 Token 预算？"
    followups:
      - "Compaction、结构化笔记和按需检索分别解决什么问题？"
