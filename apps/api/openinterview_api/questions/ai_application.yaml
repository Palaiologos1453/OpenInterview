  - id: ai-mcp-server-security
    directions: ["ai_application"]
    difficulty: bigtech
    topic: mcp
    type: fundamentals
    source: JavaGuide
    source_path: "docs/ai/agent/mcp.md"
    source_license: "Apache-2.0"
