  - id: ai-llm-gateway-routing-fallback
    directions: ["ai_application"]
    difficulty: bigtech
    topic: llm-gateway
    type: scenario
    source: JavaGuide
    source_path: "docs/ai/system-design/llm-gateway.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "请设计一个公司内部 LLM Gateway，要求支持多模型路由、限流、fallback、成本统计和调用审计。核心模块怎么拆？"
    followups:
      - "模型 A 超时后切到模型 B，会带来哪些输出一致性和成本问题？"
      - "如何按用户、应用、模型维度做配额和成本归因？"
    rubric:
      - "能拆出鉴权、路由、配额、限流、缓存、重试、降级和审计模块。"
      - "能说明多模型 fallback 的兼容性、质量波动和成本风险。"
      - "能提出日志、Trace、Token 统计、告警和灰度策略。"
    tags: ["模型网关", "多模型路由", "fallback", "成本治理"]

  - id: ai-observability-trace-evaluation
