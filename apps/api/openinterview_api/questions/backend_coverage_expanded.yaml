  - id: security-jwt-session-tradeoff
    directions: ["backend"]
    difficulty: campus
    topic: security
    type: fundamentals
    source: JavaGuide
    source_path: "docs/system-design/security/jwt-intro.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "JWT 和传统 Session 的认证方案各有什么优缺点？如果 Token 泄露或用户退出登录，系统如何处理？"
    followups:
