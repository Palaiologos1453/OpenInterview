  - id: system-design-realtime-message-push
    directions: ["backend"]
    difficulty: bigtech
    topic: system-design
    type: scenario
    source: JavaGuide
    source_path: "docs/system-design/web-real-time-message-push.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "如果要做站内实时通知，你会如何在短轮询、长轮询、SSE 和 WebSocket 之间选型？后端需要哪些连接治理能力？"
    followups:
