  - id: security-data-desensitization-logging
    directions: ["backend"]
    difficulty: campus
    topic: security
    type: scenario
    source: JavaGuide
    source_path: "docs/system-design/security/data-desensitization.md"
    source_license: "Apache-2.0"
    source_usage: "adapted"
    prompt: "后端日志、接口响应和导出文件里可能包含手机号、身份证、邮箱等敏感数据。你会如何做脱敏和访问控制？"
    followups:
      - "脱敏应该在查询层、服务层还是序列化层做？"
      - "排查线上问题时，开发需要看敏感字段怎么办？"
