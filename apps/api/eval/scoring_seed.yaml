questions:
  - id: backend-index
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: fundamental_chain
    phase: fundamentals
    prompt: "请解释数据库索引为什么能加速查询，并说明 B+ 树索引在范围查询上的优势。"
    question_meta:
      id: eval-backend-index
      phase: fundamentals
      topic: mysql
      type: fundamentals
      tags: ["MySQL", "索引", "B+树"]
    rubric:
      - "能说明索引减少扫描行数和随机查找成本。"
      - "能解释 B+ 树叶子节点有序链表适合范围查询。"
      - "能指出回表、覆盖索引、最左前缀和选择性等边界。"
      - "能结合 explain、慢查询或压测验证优化效果。"

  - id: backend-cache-consistency
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: fundamental_chain
    phase: fundamentals
    prompt: "Redis 缓存和数据库之间可能出现哪些一致性问题？你会怎么降低风险？"
