realistic_cases:
  - id: real-backend-cache-project-strong
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: resume_truth_probe
    phase: project
    prompt: "你简历里写订单系统接口 P95 延迟下降 30%，请说明你本人做了什么、指标怎么来的、为什么选这个方案。"
    question_meta:
      id: real-backend-cache-project-strong
      phase: project
      topic: project-cache
      type: project
      tags: ["项目", "Redis", "指标"]
    rubric: &project_truth_rubric
      - "是否讲清业务背景、瓶颈和目标。"
      - "是否区分个人贡献和团队成果。"
      - "是否说明技术选型、替代方案和取舍。"
      - "是否给出指标口径、验证方式、故障风险和复盘。"
    score: 88
    missing_rubric_indexes: []
    answer: "背景是订单列表接口在活动期 P95 到 420ms，慢查询和缓存命中率都不稳定。我本人负责接口链路排查、Redis 缓存设计、MySQL 联合索引调整和上线监控，不把前端改造算成自己的贡献。方案上比较过只改 SQL、加本地缓存和 Redis 分布式缓存，最后选 Redis 是因为多实例部署下本地缓存一致性更差。指标来自压测报告和线上 Prometheus，窗口是上线前后各 3 天同一时间段，P95 从 420ms 降到 290ms。风险是缓存击穿和脏读，所以加了 TTL 抖动、互斥锁、删除缓存失败重试和告警。"

  - id: real-backend-cache-project-vague
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: resume_truth_probe
    phase: project
    prompt: "你简历里写高并发缓存优化，请说明个人贡献和效果。"
    question_meta:
      id: real-backend-cache-project-vague
      phase: project
      topic: project-cache
      type: project
      tags: ["项目", "Redis", "真实性"]
    rubric: *project_truth_rubric
    score: 42
    missing_rubric_indexes: [1, 2, 3]
    answer: "这个项目主要就是用了 Redis 做缓存，提升了高并发能力。我参与了后端开发，团队一起把接口优化了，效果还不错，具体指标当时没有特别记录，主要是上线之后用户反馈更快了。"
    note: "典型包装式项目回答。"

  - id: real-backend-cache-project-missing-metric
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: resume_truth_probe
    phase: project
    prompt: "缓存优化效果如何证明？"
    question_meta:
      id: real-backend-cache-project-missing-metric
      phase: project
      topic: project-cache
      type: project
      tags: ["项目", "指标"]
    rubric: *project_truth_rubric
    score: 68
    missing_rubric_indexes: [3]
    answer: "当时订单查询压力比较大，我负责了缓存 key 设计、过期策略和数据库索引优化。方案上比较过直接扩容 MySQL 和加 Redis，最后因为读多写少所以选 Redis。个人贡献主要是代码实现、联调和灰度发布。指标这一块我只能说体感和日志里慢请求少了，但没有整理出明确的基线、时间窗口和 P95 对比。"

  - id: real-backend-incident-strong
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: resume_truth_probe
    phase: project
    prompt: "项目有没有线上故障？请讲根因、恢复动作和长期改进。"
    question_meta:
      id: real-backend-incident-strong
      phase: project
      topic: incident-review
      type: project
      tags: ["故障复盘", "项目"]
    rubric:
      - "是否说明故障现象、影响范围和发现方式。"
      - "是否定位根因并说明个人排查动作。"
      - "是否讲清恢复、回滚、降级或补偿。"
      - "是否形成长期改进、监控告警和复盘结论。"
    score: 86
    missing_rubric_indexes: []
    answer: "有一次缓存预热脚本把热点 key 的 TTL 设置成同一时间过期，活动开始后 Redis miss 暴涨，MySQL QPS 被打高，告警先从慢 SQL 和接口 P99 触发。我负责排查缓存命中率、Redis key 过期分布和数据库连接池指标，确认是集中失效。恢复上先临时限流非核心查询，同时手动预热热点 key，之后回滚脚本配置。长期改进是 TTL 加随机抖动、预热任务分批、核心接口加降级兜底，并把缓存命中率和 DB QPS 加到看板。"

  - id: real-backend-incident-weak
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: resume_truth_probe
    phase: project
    prompt: "项目有没有线上故障？"
    question_meta:
      id: real-backend-incident-weak
