      - "是否定位根因并说明个人排查动作。"
      - "是否讲清恢复、回滚、降级或补偿。"
      - "是否形成长期改进、监控告警和复盘结论。"
    score: 36
    missing_rubric_indexes: [0, 1, 2, 3]
    answer: "项目整体比较稳定，没什么大的故障。就算有问题一般也是看日志解决，后面注意一下就好了。"

  - id: real-ai-rag-eval-strong
    direction_id: ai_application
    difficulty_id: bigtech
    interviewer_style_id: resume_truth_probe
    phase: project
    prompt: "你做的 RAG 项目怎么证明效果？评测集、指标和误判怎么处理？"
    question_meta:
      id: real-ai-rag-eval-strong
      phase: project
      topic: rag-evaluation
      type: project
      tags: ["RAG", "评测", "项目"]
    rubric: &ai_eval_rubric
      - "是否说明业务目标、基线和评测集来源。"
      - "是否覆盖召回率、答案正确率、引用准确率、幻觉率、延迟和成本。"
      - "是否分析误判案例、人工复核和灰度策略。"
      - "是否能解释切分、召回、Rerank、Prompt 和监控迭代。"
    score: 90
    missing_rubric_indexes: []
    answer: "业务目标是客服知识库问答，基线是关键词检索加人工复制答案。评测集来自 300 条历史工单和 80 条人工构造边界问题，按产品、售后和账号问题分层。指标看 Top5 召回率、答案正确率、引用准确率、幻觉率、P95 延迟和单次 token 成本。误判分三类：召回不到、召回到了但 Rerank 排低、上下文正确但模型编答案。对应改了按标题层级切分、BM25+向量混合召回、Rerank 阈值和引用约束 Prompt。上线先灰度 10%，低置信度转人工，并把无引用回答和用户点踩纳入复盘集。"

  - id: real-ai-rag-eval-vague
    direction_id: ai_application
    difficulty_id: bigtech
    interviewer_style_id: resume_truth_probe
    phase: project
    prompt: "RAG 项目怎么证明效果？"
    question_meta:
      id: real-ai-rag-eval-vague
      phase: project
      topic: rag-evaluation
      type: project
      tags: ["RAG", "评测", "项目"]
    rubric: *ai_eval_rubric
    score: 44
    missing_rubric_indexes: [0, 1, 2, 3]
    answer: "我们用了向量数据库和大模型，效果比原来好很多。主要是 prompt 调了一下，然后回答更智能。具体评测没有做得很复杂，基本看几个问题回答得还可以。"

  - id: real-ai-agent-tool-risk
    direction_id: ai_application
    difficulty_id: bigtech
    interviewer_style_id: fundamental_chain
    phase: fundamentals
    prompt: "Agent 调接口下单、退款或发消息时，你会怎么控制风险？"
    question_meta:
      id: real-ai-agent-tool-risk
      phase: fundamentals
      topic: agent
      type: fundamentals
      tags: ["Agent", "工具调用", "安全"]
    rubric:
      - "能说明工具调用会放大幻觉、越权和误操作风险。"
      - "能设计参数 schema 校验、权限边界和最小授权。"
      - "能覆盖高风险动作的人审、二次确认、幂等和回滚。"
      - "能说明审计日志、沙箱、监控告警和降级策略。"
    score: 84
    missing_rubric_indexes: []
    answer: "工具调用的风险是模型一旦幻觉或理解错意图，就可能把错误动作变成真实副作用，比如误退款。我的做法是先把工具按风险分级，查询类可以自动执行，退款、下单、发消息必须二次确认或人工审核。参数用 schema 校验，用户身份和资源权限在服务端重新校验，模型不能自己传 user_id 越权。写操作要有 request_id 幂等和可回滚记录，所有工具调用记录 trace、参数摘要和操作者。异常时降级为只给建议不执行。"

  - id: real-system-design-local-tool
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: system_design
    phase: system_design
    prompt: "如果这是一个本地优先的模拟面试工具，你会怎么设计数据可靠性和隐私边界？"
    question_meta:
      id: real-system-design-local-tool
      phase: system_design
      topic: local-first
      type: scenario
      tags: ["本地优先", "隐私", "可靠性"]
