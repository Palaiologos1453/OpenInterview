answer_profiles:
  - id: empty
    score: 25
    missing_rubric_indexes: [0, 1, 2, 3]
    text: "不太清楚。"
    note: "空泛回答应低分。"
  - id: vague
    score: 42
    missing_rubric_indexes: [1, 2, 3]
    text: "{topic} 这个点我知道大概很重要，平时项目里会按常规方案处理，但具体原理和边界我还没有深入总结。"
  - id: concept-only
    score: 58
    missing_rubric_indexes: [2, 3]
    text: "这个问题的核心是 {rubric_0}，同时也要理解 {rubric_1}。不过我暂时只能讲到概念层面，还没有结合项目里的边界和验证方式展开。"
  - id: structured-mid
    score: 70
    missing_rubric_indexes: [3]
    text: "首先我会先给结论：{rubric_0}。其次补充机制：{rubric_1}。最后说明边界：{rubric_2}。这个回答还缺少更完整的线上验证和指标闭环。"
  - id: strong
    score: 86
    missing_rubric_indexes: []
    text: "首先我会把结论讲清楚：{rubric_0}。然后解释关键机制和取舍：{rubric_1}。边界上要覆盖 {rubric_2}，避免只背概念。最后落到工程验证：{rubric_3}，通过日志、指标、压测或评测集确认方案有效。"
  - id: wrong-confident
    score: 38
    missing_rubric_indexes: [1, 2, 3]
    text: "这个问题其实很简单，只要用了 {topic} 相关方案就一定是最优的，不需要考虑边界、失败场景或验证指标，线上自然会变好。"
    note: "自信但错误，规则评分容易因语气和关键词虚高。"
  - id: keyword-stuffing
    score: 45
    missing_rubric_indexes: [0, 1, 2, 3]
    text: "{topic} {rubric_0} {rubric_1} {rubric_2} {rubric_3}，这些关键词都很重要。"
    note: "关键词堆砌不应高分。"
  - id: project-linked
    score: 82
    missing_rubric_indexes: []
    text: "我在项目里遇到过类似问题，先明确背景和目标，再根据 {rubric_0} 定位核心矛盾。方案上我做了对比和取舍，重点处理 {rubric_1}。上线时考虑 {rubric_2}，最后通过 {rubric_3} 验证收益和风险。"
  - id: missing-validation
    score: 72
    missing_rubric_indexes: [3]
    text: "我会先给出定义和机制，说明 {rubric_0}，再展开 {rubric_1}。实际落地时还要考虑 {rubric_2}。但如果继续追问验证方式，我现在还缺少具体指标和实验设计。"
  - id: boundary-heavy
    score: 84
    missing_rubric_indexes: []
    text: "我的回答会先说明 {rubric_0}，再解释为什么 {rubric_1}。我不会只说标准方案，因为真实工程里要重点处理 {rubric_2}。为了避免拍脑袋，我会补充 {rubric_3}，用数据证明结论。"

questions:
  - id: backend-index
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: fundamental_chain
    phase: fundamentals
    prompt: "请解释数据库索引为什么能加速查询，并说明 B+ 树索引在范围查询上的优势。"
    question_meta:
      id: eval-backend-index
      phase: fundamentals
      topic: mysql
      type: fundamentals
      tags: ["MySQL", "索引", "B+树"]
    rubric:
      - "能说明索引减少扫描行数和随机查找成本。"
      - "能解释 B+ 树叶子节点有序链表适合范围查询。"
      - "能指出回表、覆盖索引、最左前缀和选择性等边界。"
      - "能结合 explain、慢查询或压测验证优化效果。"

  - id: backend-cache-consistency
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: fundamental_chain
    phase: fundamentals
    prompt: "Redis 缓存和数据库之间可能出现哪些一致性问题？你会怎么降低风险？"
    question_meta:
      id: eval-backend-cache-consistency
      phase: fundamentals
      topic: redis
      type: fundamentals
      tags: ["Redis", "缓存一致性"]
    rubric:
      - "能说明缓存穿透、击穿、雪崩和缓存数据库不一致。"
      - "能比较先更新数据库再删缓存、延迟双删、订阅 binlog 等方案。"
      - "能覆盖 TTL、互斥锁、降级、重试和幂等。"
      - "能说明监控、告警和数据修复手段。"

  - id: backend-thread-process
    direction_id: backend
    difficulty_id: campus
    interviewer_style_id: fundamental_chain
    phase: fundamentals
    prompt: "讲一下进程、线程和协程的区别，以及它们在后端服务中的适用场景。"
    question_meta:
      id: eval-backend-thread-process
      phase: fundamentals
      topic: operating-system
      type: fundamentals
      tags: ["操作系统", "并发"]
    rubric:
      - "能说明进程资源隔离、线程共享进程资源、协程用户态调度。"
      - "能比较上下文切换成本、通信方式和故障隔离。"
      - "能结合 IO 密集、CPU 密集和异步服务场景选型。"
      - "能指出线程池、阻塞调用和上下文传递风险。"

  - id: backend-project-truth
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: resume_truth_probe
    phase: project
    prompt: "请讲清项目背景、你的个人贡献、核心方案和结果。"
    question_meta:
      id: eval-backend-project-truth
      phase: project
      topic: project
      type: project
      tags: ["项目", "个人贡献"]
    rubric:
      - "是否讲清业务背景和目标。"
      - "是否说明个人贡献和关键技术方案。"
      - "是否给出指标结果、验证方式和复盘。"
      - "是否能解释技术选型依据、故障风险和项目真实性。"

  - id: backend-system-design
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: system_design
    phase: system_design
    prompt: "如果要支持万人同时在线模拟面试，你会如何考虑会话状态、消息队列和服务扩缩容？"
    question_meta:
      id: eval-backend-system-design
      phase: system_design
      topic: system-design
      type: scenario
      tags: ["系统设计", "扩缩容"]
    rubric:
      - "能澄清用户规模、读写比例、延迟目标和一致性要求。"
      - "能拆分接入层、会话状态、题库、评分和报告模块。"
      - "能说明 Redis/Postgres、消息队列、幂等和重试设计。"
      - "能覆盖监控、限流、降级、故障恢复和压测验证。"

  - id: ai-token-sampling
    direction_id: ai_application
    difficulty_id: campus
    interviewer_style_id: fundamental_chain
    phase: fundamentals
    prompt: "请解释 Token、上下文窗口和采样参数会怎样影响 LLM 应用的质量、成本和稳定性。"
    question_meta:
      id: eval-ai-token-sampling
      phase: fundamentals
      topic: llm-basics
      type: fundamentals
      tags: ["LLM", "Token", "采样"]
    rubric:
      - "能说明 token 数影响上下文长度、延迟和成本。"
      - "能解释 temperature、top_p 等采样参数影响随机性。"
      - "能指出上下文截断、幻觉、重复和格式漂移风险。"
      - "能结合评测集、日志和线上指标调参。"

  - id: ai-rag-pipeline
    direction_id: ai_application
    difficulty_id: bigtech
    interviewer_style_id: system_design
    phase: system_design
    prompt: "设计一个 RAG 问答链路时，文档切分、召回、Rerank 和上下文组装分别解决什么问题？"
    question_meta:
      id: eval-ai-rag-pipeline
      phase: system_design
      topic: rag
      type: scenario
      tags: ["RAG", "召回", "Rerank"]
    rubric:
      - "能说明文档切分粒度、元数据和召回召准权衡。"
      - "能解释向量召回、关键词召回和 Rerank 的作用。"
      - "能覆盖上下文组装、引用、去重和 token 预算。"
      - "能说明离线评测、线上反馈和失败案例分析。"

  - id: ai-agent-tools
    direction_id: ai_application
    difficulty_id: bigtech
    interviewer_style_id: fundamental_chain
    phase: fundamentals
    prompt: "Agent 调用工具时，为什么需要参数校验、权限控制、审计和人工确认？"
    question_meta:
      id: eval-ai-agent-tools
      phase: fundamentals
      topic: agent
      type: fundamentals
      tags: ["Agent", "工具调用", "安全"]
    rubric:
      - "能说明工具调用会放大模型幻觉和越权风险。"
      - "能解释参数 schema 校验、权限边界和最小授权。"
      - "能覆盖审计日志、人工确认、回滚和幂等。"
      - "能结合高风险动作、沙箱和监控告警设计。"

  - id: ai-evaluation
    direction_id: ai_application
    difficulty_id: bigtech
    interviewer_style_id: resume_truth_probe
    phase: project
    prompt: "你做过的 AI 应用如何证明效果？请说明评测集、指标、误判和迭代方式。"
    question_meta:
      id: eval-ai-evaluation
      phase: project
      topic: llm-evaluation
      type: project
      tags: ["AI 评测", "项目"]
    rubric:
      - "是否说明业务目标、基线和评测集来源。"
      - "是否覆盖准确率、召回率、幻觉率、延迟和成本指标。"
      - "是否分析误判案例、人工复核和灰度策略。"
      - "是否能解释 Prompt、RAG、模型选择和监控迭代。"

  - id: backend-observability
    direction_id: backend
    difficulty_id: bigtech
    interviewer_style_id: system_design
    phase: system_design
    prompt: "你会如何给一个面试系统设计日志、指标和 trace 观测体系？"
    question_meta:
      id: eval-backend-observability
      phase: system_design
      topic: observability
      type: scenario
      tags: ["可观测性", "指标", "Trace"]
    rubric:
      - "能说明日志、指标、trace 分别解决什么问题。"
      - "能覆盖延迟、错误率、吞吐、队列积压和资源使用指标。"
      - "能设计 traceId、结构化日志、采样和脱敏。"
      - "能说明告警阈值、看板、SLO 和故障复盘。"
