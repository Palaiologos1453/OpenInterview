<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenInterview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">OI</div>
          <div>
            <h1>OpenInterview</h1>
            <p>计算机校招 AI 模拟面试</p>
          </div>
        </div>

        <form id="setup-form" class="setup">
          <label>面试方向<select id="direction"></select></label>
          <label>难度<select id="difficulty"></select></label>
          <label>模式<select id="mode"></select></label>
          <label>面试官风格<select id="interviewer-style"></select></label>
          <label>本地 CosyVoice 音色 Profile<select id="voice-profile"></select></label>
          <p id="voice-profile-help" class="voice-profile-help"></p>
          <label>候选人姓名<input id="candidate-name" type="text" placeholder="可选" /></label>
          <label>
            简历 / 项目经历
            <textarea id="resume" rows="7" placeholder="粘贴简历片段，系统会抽取技术栈、项目和风险点"></textarea>
          </label>
          <label>导入简历文件<input id="resume-file" type="file" accept=".txt,.md,.pdf,.docx" /></label>

          <div class="inline-actions">
            <button id="import-resume-button" class="secondary" type="button">导入文件</button>
            <button id="analyze-resume-button" class="secondary" type="button">分析简历</button>
            <button id="start-button" type="submit">开始面试</button>
          </div>

          <details class="provider-panel">
            <summary>模型配置（本机保存）</summary>
            <p class="provider-note">
              文本面试默认走题库和本地规则，不需要等待 LLM。LLM 只用于可选报告总结；语音输入/播报默认走浏览器，本地 SenseVoice/CosyVoice 属于可选增强。
            </p>
            <div class="provider-grid">
              <h3>LLM</h3>
              <label>Provider 模板
                <select id="llm-template">
                  <option value="">手动填写</option>
                  <option value="openai">OpenAI</option>
                  <option value="deepseek">DeepSeek</option>
                  <option value="dashscope">阿里云百炼 DashScope</option>
                  <option value="siliconflow">SiliconFlow</option>
                  <option value="moonshot">Moonshot / Kimi</option>
                  <option value="ollama">Ollama 本地</option>
                  <option value="mock">Mock 演示</option>
                </select>
              </label>
              <label>Provider
                <select id="llm-provider">
                  <option value="mock">Mock</option>
                  <option value="openai_compatible">OpenAI Compatible</option>
                  <option value="ollama">Ollama</option>
                </select>
              </label>
              <label>API Base<input id="llm-api-base" type="text" placeholder="例如 https://api.openai.com/v1" /></label>
              <label>Model<input id="llm-model" type="text" placeholder="例如 gpt-4o-mini 或兼容模型名" /></label>
              <label>API Key<input id="llm-api-key" type="password" autocomplete="off" /></label>
              <label>Temperature<input id="llm-temperature" type="number" min="0" max="2" step="0.1" /></label>
              <label class="toggle"><input id="llm-allow-fallback" type="checkbox" /><span>LLM 失败时允许 Mock 回退（仅开发调试）</span></label>

              <h3>语音配置向导</h3>
              <label>语音模式
                <select id="voice-mode">
                  <option value="browser">浏览器语音：不需要模型</option>
                  <option value="api">云端 API：填写 URL / Key / Model</option>
                  <option value="local">本地模型：填写模型目录</option>
                  <option value="disabled">关闭语音</option>
                </select>
              </label>
              <p id="voice-mode-help" class="voice-mode-help"></p>

              <div id="local-voice-paths" class="voice-local-paths" hidden>
                <label>Silero VAD ONNX 路径<input id="local-vad-model" type="text" placeholder="models/vad/silero-vad/silero_vad.onnx" /></label>
                <label>SenseVoice 模型目录<input id="local-asr-model-dir" type="text" placeholder="models/asr/SenseVoiceSmall" /></label>
                <label>CosyVoice 模型目录<input id="local-tts-model-dir" type="text" placeholder="models/tts/Fun-CosyVoice3-0.5B" /></label>
                <label>CosyVoice runtime 路径<input id="local-cosyvoice-path" type="text" placeholder="D:\CosyVoice 或 third_party/CosyVoice" /></label>
              </div>

              <h3 class="voice-api-field" hidden>ASR API</h3>
              <label class="voice-api-field" hidden>ASR API Base<input id="asr-api-base" type="text" placeholder="兼容 /v1/audio/transcriptions" /></label>
              <label class="voice-api-field" hidden>ASR Model<input id="asr-model" type="text" placeholder="例如 gpt-4o-mini-transcribe" /></label>
              <label class="voice-api-field" hidden>ASR API Key<input id="asr-api-key" type="password" autocomplete="off" /></label>

              <h3 class="voice-api-field" hidden>TTS API</h3>
              <label class="voice-api-field" hidden>TTS API Base<input id="tts-api-base" type="text" placeholder="兼容 /v1/audio/speech" /></label>
              <label class="voice-api-field" hidden>TTS Model<input id="tts-model" type="text" placeholder="例如 gpt-4o-mini-tts" /></label>
              <label class="voice-api-field" hidden>TTS Voice<input id="tts-voice" type="text" placeholder="例如 alloy" /></label>
              <label class="voice-api-field" hidden>TTS API Key<input id="tts-api-key" type="password" autocomplete="off" /></label>

              <label class="voice-provider-field" hidden>ASR Provider
                <select id="asr-provider">
                  <option value="browser">Browser</option>
                  <option value="sensevoice">Local SenseVoice</option>
                  <option value="openai_compatible">OpenAI Compatible</option>
                  <option value="disabled">Disabled</option>
                </select>
              </label>
              <label class="voice-provider-field" hidden>TTS Provider
                <select id="tts-provider">
                  <option value="browser">Browser</option>
                  <option value="cosyvoice">Local CosyVoice</option>
                  <option value="openai_compatible">OpenAI Compatible</option>
                  <option value="disabled">Disabled</option>
                </select>
              </label>

              <div class="provider-actions">
                <button id="save-provider-config" class="secondary" type="button">保存配置</button>
                <button id="save-local-voice-config" class="secondary voice-local-button" type="button" hidden>保存本地语音路径</button>
                <button id="test-llm-config" class="secondary" type="button">测试 LLM</button>
                <button id="clear-provider-config" class="secondary" type="button">清空配置</button>
                <button id="test-asr-config" class="secondary" type="button">测试 ASR</button>
                <button id="test-tts-config" class="secondary" type="button">测试 TTS</button>
                <button id="test-voice-config" class="secondary" type="button">语音自检</button>
              </div>
            </div>
          </details>

          <div class="voice-row">
            <label class="toggle"><input id="voice-output" type="checkbox" /><span>语音播报</span></label>
          </div>
        </form>

        <section id="setup-checklist" class="status setup-checklist" aria-live="polite"></section>
        <div id="runtime-status" class="status">正在加载目录...</div>
        <div id="resume-panel" class="status" hidden></div>
      </aside>

      <section class="workspace">
        <div class="interview-header">
          <div>
            <p class="eyebrow">Campus CS Interview</p>
            <h2 id="session-title">选择方向后开始模拟</h2>
          </div>
          <div class="inline-actions">
            <button id="report-button" class="secondary" type="button" disabled>生成报告</button>
            <button id="coverage-button" class="secondary" type="button">题库覆盖</button>
            <button id="review-items-button" class="secondary" type="button">错题本</button>
            <button id="history-button" class="secondary" type="button">历史</button>
          </div>
        </div>

        <section id="conversation" class="conversation" aria-live="polite">
          <div class="empty-state">
            <strong>OpenInterview</strong>
            <span>选择方向和难度，填写本地模型配置后开始一轮计算机校招模拟面试。</span>
          </div>
        </section>

        <section id="live-transcript" class="transcript-panel" aria-live="polite">
          <div class="transcript-head">
            <strong>实时转写</strong>
            <span id="live-transcript-source">等待语音输入</span>
          </div>
          <div id="live-transcript-text" class="transcript-text empty">语音转文字会实时显示在这里。</div>
          <div id="live-transcript-status" class="transcript-status">未开始</div>
          <div id="voice-timings" class="voice-timings" hidden></div>
        </section>

        <form id="answer-form" class="answer-box">
          <textarea id="answer" rows="5" placeholder="输入你的回答。建议按背景、方案、取舍、结果组织。" disabled></textarea>
          <div class="answer-actions">
            <button id="listen-button" class="secondary" type="button" disabled>语音输入</button>
            <button id="send-button" type="submit" disabled>提交回答</button>
          </div>
        </form>

        <section id="report" class="report" hidden></section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
